
services:
  nginx-proxy:
    image: jc21/nginx-proxy-manager:
    container_name: npm
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - npm-data:/data
      - npm-ssl-data:/etc/letsencrypt
    networks:
      homelab-network:

volumes:
  npm-data:
  npm-ssl-data:
